<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Management</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="nav-logo-container">
        <a href="admin-dashboard.html">
            <img src="nav-logo.png" class="nav-logo-img">
        </a>
    </div>
    
    <nav class="nav-links">
     <a href="admin.html">Dashboard</a>
        <a href="BusManegment.html">Buses</a>
        <a href="Schedule Management.html"  class="active">Schedules</a>
        <a href="UserMangemnt.html" >Users</a>
    </nav>

    <div class="logout-container">
        <button class="btn btn-secondary logout-btn">Logout</button>
    </div>
</header>

<!-- CONTAINER -->
<div class="admin-container">

<div class="card">
<h2>🗓 Create Schedule</h2>

<form id="scheduleForm">

<!-- ROUTE -->
<div class="form-group">
<label>Route</label>
<select id="route" required>
<option value="">Select Route</option>
<option>Al Waha Metro Station→ Colleges</option>
<option>Colleges → Al Waha Metro Station</option>
</select>
</div>

<!-- BUS -->
<div class="form-group">
<label>Bus</label>
<select id="busSelect" required></select>
</div>

<!-- TYPE -->
<div class="form-group">
<label>Schedule Type</label>
<select id="type">
<option>Daily</option>
<option>Weekly</option>
<option>Monthly</option>
</select>
</div>

<!-- DATE -->
<div class="form-group">
<label>Date</label>
<input type="date" id="date" required>
</div>

<!-- DAYS -->
<div class="form-group">
<label>Days</label>
<div class="days">
<button type="button" onclick="toggleDay(this)">Sun</button>
<button type="button" onclick="toggleDay(this)">Mon</button>
<button type="button" onclick="toggleDay(this)">Tue</button>
<button type="button" onclick="toggleDay(this)">Wed</button>
<button type="button" onclick="toggleDay(this)">Thu</button>
</div>
</div>

<!-- TIMES -->
<div class="form-group">
<label>Arrival Times</label>
<div id="timesContainer">
<input type="time" class="timeInput" required>
</div>
<button type="button" class="btn add-time" onclick="addTime()">+ Add Time</button>
</div>

<button class="btn btn-primary">Save Schedule</button>

</form>
</div>

<!-- TABLE -->
<div class="card">
<h2>Schedule List</h2>
<table>
<thead>
<tr>
<th>Route</th>
<th>Bus</th>
<th>Type</th>
<th>Days</th>
<th>Times</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="scheduleTable"></tbody>
</table>
</div>

</div>
<style>

.days button {
    padding: 8px 12px;
    margin: 3px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #f5f5f5;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 14px;
}


.days button:hover {
    background-color: #e0e0e0;
}


.days button.active {
    background-color: #4a90e2; /* أزرق */
    color: white;
    transform: scale(1.1); /* يكبر شوي */
    font-weight: bold;
}
</style>
<script>

// ================= DATA =================
let buses = JSON.parse(localStorage.getItem("buses")) || [];
let schedules = JSON.parse(localStorage.getItem("schedules")) || [];

function save(){
    localStorage.setItem("schedules", JSON.stringify(schedules));
}

// ================= LOAD BUSES =================
function loadBuses(){
    const busSelect = document.getElementById("busSelect");
    busSelect.innerHTML = "<option value=''>Select Bus</option>";

    buses.filter(b=>b.status==="Active").forEach(bus=>{
        busSelect.innerHTML += `
        <option value="${bus.number}">
        ${bus.number} (${bus.capacity} seats)
        </option>`;
    });
}

// ================= ADD TIME =================
function addTime(){
    const timesContainer = document.getElementById("timesContainer");
    const div = document.createElement("div");
    div.innerHTML = `<input type="time" class="timeInput">`;
    timesContainer.appendChild(div);
}

// ================= DAYS =================
let selectedDays = [];

function toggleDay(btn){
    btn.classList.toggle("active");

    const day = btn.innerText.trim();
    if(selectedDays.includes(day)){
        selectedDays = selectedDays.filter(d => d !== day);
    } else {
        selectedDays.push(day);
    }
}

// ================= ADD SCHEDULE =================
const scheduleForm = document.getElementById("scheduleForm");
const timesContainer = document.getElementById("timesContainer");
const route = document.getElementById("route");
const busSelect = document.getElementById("busSelect");
const type = document.getElementById("type");
const date = document.getElementById("date");
const scheduleTable = document.getElementById("scheduleTable");

scheduleForm.addEventListener("submit", e => {
    e.preventDefault();

    const times = [...document.querySelectorAll(".timeInput")]
        .map(t => t.value)
        .filter(v => v);

    const daysCopy = [...selectedDays];

    schedules.push({
        id: Date.now(),
        route: route.value,
        bus: busSelect.value,
        type: type.value,
        date: date.value,
        days: daysCopy,
        times: times
    });

    save();
    render();

    // إعادة تعيين الفورم
    scheduleForm.reset();
    timesContainer.innerHTML = `<input type="time" class="timeInput">`;
    selectedDays = [];
    document.querySelectorAll(".days button").forEach(btn => btn.classList.remove("active"));
});

// ================= RENDER =================
function render(){
    scheduleTable.innerHTML = "";

    schedules.forEach(s => {
        scheduleTable.innerHTML += `
        <tr>
        <td>${s.route}</td>
        <td>${s.bus}</td>
        <td>${s.type}</td>
        <td>${s.days.join(", ")}</td>
        <td>${s.times.join(", ")}</td>
        <td>
        <button class="btn btn-danger" onclick="deleteSchedule(${s.id})">Delete</button>
        </td>
        </tr>`;
    });
}

// ================= DELETE =================
function deleteSchedule(id){
    schedules = schedules.filter(s => s.id !== id);
    save();
    render();
}

// ================= LOGOUT =================
document.querySelectorAll('.logout-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        alert("Logged out successfully");
        window.location.href = "login.html";
    });
});

// INIT
loadBuses();
render();

</script>

</body>
</html>
