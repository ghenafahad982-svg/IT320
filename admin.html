<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="adminDash">

  <div class="app-container">
    <h1>Admin Dashboard</h1>

    <div class="data-card">
      <h3>Reservation Overview</h3>
      <p><strong>Student:</strong> Student1</p>
      <p><strong>Bus:</strong> Bus-12</p>
      <p><strong>Reservation Type:</strong> Weekly</p>
      <p><strong>Status:</strong> Active</p>
    </div>

    <div class="data-card">
      <h3>Admin Actions</h3>
      <div class="form-group">
        <button class="btn btn-primary">Add New Bus</button>
      </div>
      <div class="form-group">
        <button class="btn btn-secondary">Edit Bus</button>
      </div>
      <div class="form-group">
        <button class="btn btn-secondary">Mark Bus as Inactive</button>
      </div>
    </div>
  </div>

</body>
</html>
