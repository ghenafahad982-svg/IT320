<!DOCTYPE html>
<html>
<head>
<title>User Management</title>
<link rel="stylesheet" href="style (7).css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <header class="navbar">
    <div class="nav-logo-container">
        <a href="admin-dashboard.html">
            <img src="nav-logo.png" alt="KSU Subul Logo" class="nav-logo-img">
        </a>
    </div>
    
    <nav class="nav-links">
	     <a href="Admin.html">AdminDashBoard</a>
        <a href="BusManagement.html">Buses</a>
        <a href="ScheduleManagement.html">Schedules</a>
        <a href="UserManagement.html" class="active">Users</a>
    </nav>

    <div class="logout-container">
        <button class="btn btn-secondary logout-btn">Logout</button>
    </div>
</header>
        </div>
<div id="admin-dashboard" class="admin-container">

<div class="card">
<h2> User Management</h2>

<form id="userForm">

<div class="form-group">
<label>Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Role</label>
<select id="role">
<option>Student</option>
<option>Admin</option>
</select>
</div>

<button class="btn btn-primary">Add User</button>

</form>
</div>

<div class="card">
<h2>User List</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="userTable"></tbody>

</table>
</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];

function save(){
localStorage.setItem("users", JSON.stringify(users));
}

function render(){
userTable.innerHTML="";

users.forEach(u=>{
userTable.innerHTML += `
<tr>
<td>${u.name}</td>
<td>${u.email}</td>
<td>${u.role}</td>
<td>${u.status}</td>
<td>
<button class="btn btn-secondary" onclick="toggleUser(${u.id})">
${u.status==="Active"?"Deactivate":"Activate"}
</button>
</td>
</tr>
`;
});
}

userForm.addEventListener("submit", e=>{
e.preventDefault();

users.push({
id: Date.now(),
name: name.value,
email: email.value,
role: role.value,
status: "Active"
});

save();
render();
userForm.reset();
});

function toggleUser(id){
users = users.map(u =>
u.id===id ? {...u, status: u.status==="Active"?"Inactive":"Active"} : u
);
save();
render();
}

render();
document.querySelectorAll('.logout-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        alert("Logged out successfully");
        window.location.href = "login.html";
    });
});

</script>
</body>
</html>
