<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - KSU Subul</title>
    <link rel="stylesheet" href="style.css">
</head>
<body > 
    
    <div class="app-container">
        
        <div style="text-align: center; margin-bottom: 1.875rem;">
            <h1 style="color: var(--primary-blue);">Create Account</h1>
            <p>Join KSU Subul to reserve your seat ahead of time.</p>
        </div>

        <form id="register-form">
            
            <div class="form-group">
                <label for="full-name">Full Name</label>
                <input type="text" id="full-name" placeholder="e.g.,Razan Alqahtani" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="e.g., name@example.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" placeholder="e.g., 05XXXXXXXX" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
                <p style="font-size: 0.75rem; color: #666; margin-top: -0.3125rem;">Min 8 chars, 1 uppercase, 1 lowercase, 1 number, 1 special char.</p>
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Re-enter your password" required>
            </div>
            
            <p id="register-error" class="error-message"></p>
            <button type="submit" id="register-btn" class="btn-primary btn">Sign Up</button>
        </form>
        
        <div style="text-align: center; margin-top: 1.25rem;">
            <p style="font-size: 0.875rem;">Already have an account? <a href="login.html" style="color: var(--primary-blue); font-weight: bold;">Log In</a></p>
        </div>

    </div>

    <script src="register.js"></script>
</body>
</html>
